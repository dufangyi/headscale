name: Build Headscale Windows EXE

on:
  workflow_dispatch:    # 手动点一下就跑

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build EXE
        run: go build -o headscale_windows_amd64.exe ./cmd/headscale

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: headscale-windows-exe
          path: headscale_windows_amd64.exe
